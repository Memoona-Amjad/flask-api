version: '3.8'

services:
  api:
    build: ./api
    container_name: flask-api
    ports:
      - '5001:5000'
    environment:
      FLASK_ENV: development
    volumes:
      - ./api:/app
    networks:
      - app-network
  
  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - '8080:80'
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - app-network
    depends_on:
      - api

networks:
  app-network:
    driver: bridge 

